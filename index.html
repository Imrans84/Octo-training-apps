<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="container">
      <h1>Task Manager</h1>

      <form id="add-task-form" data-testid="task-manager-form" novalidate>
        <label for="task-input">New task</label>

        <div class="input-row">
          <input
            type="text"
            id="task-input"
            data-testid="task-manager-form-input"
            placeholder="What needs doing?"
            autocomplete="off"
            maxlength="200"
          />

          <button type="submit" data-testid="task-manager-form-submit">
            Add
          </button>
        </div>

        <p id="form-error" class="error" role="alert" aria-live="polite"></p>
      </form>

      <nav class="filters" aria-label="Filter tasks">
        <button
          class="filter-btn active"
          data-filter="all"
          data-testid="filter-all"
        >
          All
        </button>

        <button
          class="filter-btn"
          data-filter="active"
          data-testid="filter-active"
        >
          Active
        </button>

        <button
          class="filter-btn"
          data-filter="completed"
          data-testid="filter-completed"
        >
          Completed
        </button>
      </nav>

      <p id="stats" class="stats" aria-live="polite"></p>

      <ul
        id="task-list"
        data-testid="task-list"
        aria-label="Task list"
        aria-live="polite"
      ></ul>

      <div id="empty-state" class="empty-state" hidden>
        <p>No tasks yet</p>
      </div>

      <button
        id="clear-completed"
        data-testid="clear-completed"
        class="secondary"
      >
        Clear completed
      </button>
    </main>

    <section class="container study-section">
      <hr />

      <h2>AI Study Coach</h2>

      <textarea
        id="study-input"
        placeholder="Paste AI JSON here..."
        rows="6"
      ></textarea>

      <br /><br />

      <button id="parse-btn">Parse Plan</button>

      <p id="study-error" class="error"></p>

      <div id="study-output"></div>
    </section>

    <footer class="footer">
      <p>AI Development Training by Octo Apps</p>
      <p>Day 9</p>
      <p>Authentication • Authorization • Routing</p>
    </footer>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
